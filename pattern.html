<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">パターン詳細 — デザインパターン大全</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────── -->
<header class="site-header">
  <button class="menu-toggle" id="menu-toggle" aria-label="メニュー">☰</button>
  <a class="header-logo" href="index.html">
    <span class="logo-icon">🎮</span>
    <span>デザインパターン大全</span>
  </a>
  <div class="header-search">
    <span class="search-icon">🔍</span>
    <input type="search" id="search-input" placeholder="パターンを検索…" autocomplete="off">
    <div class="search-results" id="search-results"></div>
  </div>
  <div class="header-actions">
    <button class="btn-icon" id="theme-btn" title="テーマ切り替え">☀️</button>
  </div>
</header>

<!-- ── Layout ──────────────────────────────────────────────── -->
<div class="layout">
  <nav class="sidebar"><div id="sidebar-nav"></div></nav>

  <main class="main-content" id="main-content">
    <div class="coming-soon" id="loading-state">
      <div class="big">⏳</div>
      <h2>読み込み中…</h2>
    </div>
  </main>
</div>

<footer class="site-footer">
  <a href="index.html">← トップへ</a>
  <span>© 2025 Design Pattern Learning</span>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  themeVariables: {
    background:           '#161b22',
    mainBkg:              '#1c2128',
    nodeBorder:           '#30363d',
    clusterBkg:           '#161b22',
    titleColor:           '#e6edf3',
    lineColor:            '#8b949e',
    primaryColor:         '#1c2128',
    primaryTextColor:     '#e6edf3',
    primaryBorderColor:   '#30363d',
    secondaryColor:       '#21262d',
    tertiaryColor:        '#21262d',
    edgeLabelBackground:  '#161b22',
    fontFamily:           'ui-monospace, SFMono-Regular, Consolas, monospace',
    fontSize:             '13px',
  },
  classDiagram: { useMaxWidth: true },
});
</script>
<script src="assets/js/sidebar.js"></script>
<script src="assets/js/pattern-content.js"></script>
<script src="assets/js/main.js"></script>
<script>
/* ─── Category metadata ─────────────────────────────────── */
const CAT_INFO = {
  'game':         { label: 'ゲームパターン',     badge: 'badge-game' },
  'game-ai':      { label: 'ゲーム AI',          badge: 'badge-game-ai' },
  'network':      { label: 'ネットワーク',        badge: 'badge-network' },
  'concurrency':  { label: '並行・非同期',        badge: 'badge-concurrency' },
  'creational':   { label: '生成（Creational）',  badge: 'badge-creational' },
  'structural':   { label: '構造（Structural）',  badge: 'badge-structural' },
  'behavioral':   { label: '振る舞い（Behavioral）', badge: 'badge-behavioral' },
  'data':         { label: 'データ・永続化',      badge: 'badge-data' },
  'architecture': { label: 'アーキテクチャ',      badge: 'badge-architecture' },
  'functional':   { label: '関数型・汎用',        badge: 'badge-functional' },
};

function diffDots(n, cls = '') {
  return `<span class="dots ${cls}">${[1,2,3].map(i =>
    `<span class="dot ${i <= n ? 'filled' : ''}"></span>`).join('')}</span>`;
}

function codeBlock(code, lang = 'csharp', label = 'C#', labelClass = 'csharp') {
  return `
    <div class="code-wrap">
      <div class="code-label ${labelClass}">${label === 'C#' ? '🔷 C#' : '🟢 Unity C#'}</div>
      <pre><code class="language-${lang}">${escHtml(code.trim())}</code></pre>
      <button class="copy-btn">コピー</button>
    </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function relatedChips(ids) {
  if (!ids || !ids.length) return '<span class="text-muted">—</span>';
  return ids.map(id => {
    const p = (window.PATTERNS || {})[id];
    const name = p ? p.name : id;
    return `<a class="related-chip" href="pattern.html?id=${id}">${name}</a>`;
  }).join('');
}

function renderQuiz(quizArr) {
  if (!quizArr || !quizArr.length) return '';
  return quizArr.map((q, qi) => `
    <div class="quiz-card" id="quiz-${qi}">
      <p>Q${qi+1}. ${escHtml(q.q)}</p>
      <ul class="quiz-options">
        ${q.options.map((opt, oi) => `
          <li class="quiz-option" data-correct="${oi === q.answer}" onclick="handleQuiz(this)">
            ${escHtml(opt)}
          </li>`).join('')}
      </ul>
      <div class="quiz-feedback">${escHtml(q.explanation || '')}</div>
    </div>
  `).join('');
}

window.handleQuiz = function(el) {
  const card = el.closest('.quiz-card');
  if (card.dataset.answered) return;
  card.dataset.answered = '1';
  const correct = el.dataset.correct === 'true';
  el.classList.add(correct ? 'correct' : 'wrong');
  if (!correct) card.querySelector('[data-correct="true"]')?.classList.add('correct');
  const fb = card.querySelector('.quiz-feedback');
  if (fb && fb.textContent.trim()) fb.classList.add('show');
};

/* ─── Main render ───────────────────────────────────────── */
function renderPattern(p) {
  const cat = CAT_INFO[p.category] || { label: p.category, badge: 'badge-game' };

  const codeSection = p.csharpCode ? `
    <section class="section">
      <h2>💻 C# サンプルコード</h2>
      <div class="tab-container">
        <div class="tabs">
          <button class="tab-btn active" data-tab="cs">🔷 C# 基本実装</button>
          ${p.unityCode ? `<button class="tab-btn" data-tab="unity">🟢 Unity 応用例</button>` : ''}
        </div>
        <div class="tab-panel active" data-tab="cs">
          ${codeBlock(p.csharpCode, 'csharp', 'C#', 'csharp')}
        </div>
        ${p.unityCode ? `
        <div class="tab-panel" data-tab="unity">
          ${codeBlock(p.unityCode, 'csharp', 'Unity C#', 'unity')}
        </div>` : ''}
      </div>
    </section>` : '';

  const isMermaid = p.diagram && /^\s*(classDiagram|graph|flowchart|sequenceDiagram|erDiagram)/.test(p.diagram);
  const diagramSection = p.diagram ? `
    <section class="section">
      <h2>📐 構造図</h2>
      ${isMermaid
        ? `<div class="mermaid-wrap"><pre class="mermaid">${p.diagram.trim()}</pre></div>`
        : `<div class="diagram">${escHtml(p.diagram)}</div>`}
    </section>` : '';

  const antipatternSection = p.antipattern ? `
    <section class="section">
      <h2>⚠️ アンチパターン・注意点</h2>
      <div class="warning-box">
        <span class="warn-icon">⚠️</span>
        <div>${p.antipattern}</div>
      </div>
    </section>` : '';

  const quizSection = p.quiz && p.quiz.length ? `
    <section class="section">
      <h2>🧠 理解度チェック</h2>
      ${renderQuiz(p.quiz)}
    </section>` : '';

  document.getElementById('main-content').innerHTML = `
    <!-- Breadcrumb -->
    <nav class="breadcrumb">
      <a href="index.html">🏠 ホーム</a>
      <span class="sep">›</span>
      <span class="badge ${cat.badge}">${cat.label}</span>
      <span class="sep">›</span>
      <span>${p.name}</span>
    </nav>

    <!-- Header -->
    <div class="pattern-header">
      <h1 class="pattern-title">
        ${p.name}
        <span class="pattern-title-ja">${p.nameJa || ''}</span>
      </h1>
      <div class="pattern-meta">
        <span class="badge ${cat.badge}">${cat.label}</span>
        <span class="meta-group">難易度 ${diffDots(p.difficulty)}</span>
        <span class="meta-group">ゲーム頻出度 ${diffDots(p.gameFrequency, 'freq')}</span>
        ${(p.tags||[]).slice(0,4).map(t=>`<span class="badge" style="background:var(--bg3);color:var(--text2)">${t}</span>`).join('')}
      </div>
      <blockquote class="pattern-summary">${p.summary}</blockquote>
    </div>

    <!-- Problem -->
    ${p.problem ? `
    <section class="section">
      <h2>❓ どんな問題を解決するか</h2>
      <div>${p.problem}</div>
    </section>` : ''}

    <!-- Solution -->
    ${p.solution ? `
    <section class="section">
      <h2>💡 解決のアイデア</h2>
      <div>${p.solution}</div>
    </section>` : ''}

    ${diagramSection}
    ${codeSection}

    <!-- Pros / Cons -->
    ${(p.pros||p.cons) ? `
    <section class="section">
      <h2>⚖️ メリット・デメリット</h2>
      <div class="pros-cons">
        <div class="pros-block">
          <h4>✅ メリット</h4>
          <ul>${(p.pros||[]).map(s=>`<li>${s}</li>`).join('')}</ul>
        </div>
        <div class="cons-block">
          <h4>❌ デメリット</h4>
          <ul>${(p.cons||[]).map(s=>`<li>${s}</li>`).join('')}</ul>
        </div>
      </div>
    </section>` : ''}

    ${antipatternSection}

    <!-- Related -->
    <section class="section">
      <h2>🔗 関連パターン</h2>
      <div class="related-list">${relatedChips(p.related)}</div>
    </section>

    ${quizSection}
  `;

  document.title = `${p.name} — デザインパターン大全`;
  initTabs();
  initCopyButtons();
  initQuiz();
  initHighlight();
  if (typeof mermaid !== 'undefined') {
    mermaid.run({ querySelector: '.mermaid' });
  }
}

/* ─── フォールバック：patterns.json のメタデータで準備中ページ表示 ── */
async function renderFallback(id) {
  let meta = null;
  try {
    const res = await fetch('data/patterns.json');
    const all = await res.json();
    meta = all.find(p => p.id === id);
  } catch (e) { /* ignore */ }

  const cat = meta ? (CAT_INFO[meta.category] || { label: meta.category, badge: 'badge-game' }) : { label: '不明', badge: 'badge-game' };
  const name = meta?.name || id;
  const nameJa = meta?.nameJa || '';
  const summary = meta?.summary || '';
  const tags = (meta?.tags || []).map(t =>
    `<span class="badge" style="background:var(--bg3);color:var(--text2)">${t}</span>`
  ).join('');
  const related = relatedChips(meta?.related || []);

  document.getElementById('main-content').innerHTML = `
    <nav class="breadcrumb">
      <a href="index.html">🏠 ホーム</a>
      <span class="sep">›</span>
      <span class="badge ${cat.badge}">${cat.label}</span>
      <span class="sep">›</span>
      <span>${name}</span>
    </nav>

    <div class="pattern-header">
      <h1 class="pattern-title">
        ${name}
        <span class="pattern-title-ja">${nameJa}</span>
      </h1>
      <div class="pattern-meta">
        <span class="badge ${cat.badge}">${cat.label}</span>
        ${tags}
      </div>
      ${summary ? `<blockquote class="pattern-summary">${summary}</blockquote>` : ''}
    </div>

    <div class="info-box" style="margin-top:1.5rem">
      <span class="info-icon">🚧</span>
      <div>
        <strong>このパターンのコンテンツは現在執筆中です。</strong><br>
        <span style="font-size:.875rem;color:var(--text2)">
          近日中に C# サンプルコード・解説・クイズが追加される予定です。<br>
          関連パターンから学習を続けてください。
        </span>
      </div>
    </div>

    ${meta?.related?.length ? `
    <section class="section" style="margin-top:2rem">
      <h2>🔗 関連パターン</h2>
      <div class="related-list">${related}</div>
    </section>` : ''}
  `;

  document.title = `${name} — デザインパターン大全`;
}

/* ─── Boot ──────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', async () => {
  buildSidebar();

  const id = new URLSearchParams(location.search).get('id');

  if (!id) {
    document.getElementById('main-content').innerHTML = `
      <div class="coming-soon">
        <div class="big">🚧</div>
        <h2>パターンが指定されていません</h2>
        <p><a href="index.html">← トップへ戻る</a></p>
      </div>`;
    return;
  }

  // コンテンツあり → 通常表示
  if (window.PATTERNS && window.PATTERNS[id]) {
    renderPattern(window.PATTERNS[id]);
    return;
  }

  // コンテンツなし → patterns.json メタデータで準備中ページを表示
  await renderFallback(id);
});
</script>
</body>
</html>
